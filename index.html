<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U2Them - Premium Platform</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!-- Legacy compatibility layer scripts matching setup preferences -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
</head>
<body>

    <!-- STAGE 1: SECURE PORTAL GATEWAY -->
    <div id="authScreen" class="screen active">
        <div class="welcome-card">
            <img src="logo.png" alt="U2Them" class="welcome-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/5968/5968771.png'">
            <h1>U2Them</h1>
            <p>Real-Time Messenger Platform</p>
            <button id="googleLoginBtn" class="btn-primary">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="G">
                Sign in with Google
            </button>
        </div>
    </div>

    <!-- STAGE 2: HUB SELECTOR MATRIX -->
    <div id="roomScreen" class="screen">
        <header class="app-header">
            <div class="header-left">
                <img id="userAvatar" src="logo.png" class="app-logo" alt="User">
                <div class="header-info">
                    <h2 id="welcomeUser">Welcome User</h2>
                    <p class="status-text">Select channel matrix</p>
                </div>
            </div>
            <button id="logoutBtn" class="icon-btn"><span class="material-icons">logout</span></button>
        </header>

        <div class="room-list">
            <div class="room-card" onclick="joinRoom('Public')">
                <div class="room-icon"><span class="material-icons">public</span></div>
                <div class="room-details">
                    <h3>Public Chatroom</h3>
                    <p>Global open workspace matrix</p>
                </div>
                <span class="material-icons chevron">chevron_right</span>
            </div>

            <div class="room-card" onclick="joinRoom('Private')">
                <div class="room-icon secured"><span class="material-icons">lock</span></div>
                <div class="room-details">
                    <h3>Private Vault</h3>
                    <p>Protected conversation environment</p>
                </div>
                <span class="material-icons chevron">lock</span>
            </div>
        </div>
    </div>

    <!-- STAGE 3: APPLICATION MAIN INTERFACE WORKSPACE -->
    <div id="chatScreen" class="screen">
        <header class="app-header">
            <div class="header-left">
                <button onclick="leaveChat()" class="icon-btn"><span class="material-icons">arrow_back</span></button>
                <div class="header-info">
                    <h2 id="currentRoomTitle">Active Room</h2>
                    <div class="status-meta">
                        <span class="status-dot"></span>
                        <p class="status-text">End-to-End Encryption Layer Active</p>
                    </div>
                </div>
            </div>
            <div class="header-actions">
                <span class="material-icons">more_vert</span>
            </div>
        </header>

        <main class="chat-messages" id="chatMessages"></main>

        <footer class="chat-input-area">
            <form id="messageForm">
                <div class="input-wrapper">
                    <!-- Media selection tool attachment icon layout -->
                    <button type="button" class="icon-btn attach-btn" onclick="triggerMockMedia()">
                        <span class="material-icons">attach_file</span>
                    </button>
                    <input type="text" id="messageInput" placeholder="Type a message..." required autocomplete="off">
                </div>
                <button type="submit" id="sendBtn">
                    <span class="material-icons">send</span>
                </button>
            </form>
        </footer>
    </div>

</body>
</html>
